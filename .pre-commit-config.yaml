# Local pre-commit layer (CQ-12, SEC-17 Gate 1). Install with:
#   pre-commit install                    # runs ruff + ruff-format + gitleaks on commit
#   pre-commit install --hook-type pre-push  # also runs mypy before push (slower)
#
# This is a *local* speed bump, not a replacement for `make verify` / CI — it catches
# the cheap stuff before it's even committed. CI remains the actual merge-blocking gate.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20  # matches pyproject.toml's [dependency-groups] dev floor (ruff>=0.15)
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(monitor|store|report|tests|scripts)/
      - id: ruff-format
        files: ^(monitor|store|report|tests|scripts)/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1  # matches pyproject.toml's [dependency-groups] dev floor (mypy>=1.13,<2)
    hooks:
      - id: mypy
        stages: [pre-push]
        additional_dependencies: []
        args: []
        pass_filenames: false
        entry: mypy
